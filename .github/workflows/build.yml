name: Create RoboRIO JAR

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Robot JAR
        run: ./gradlew :Robot:jar

      - name: Upload RoboRIO JAR
        uses: actions/upload-artifact@v4
        with:
          name: Robot-RoboRIO
          path: Robot/build/libs/*.jar
